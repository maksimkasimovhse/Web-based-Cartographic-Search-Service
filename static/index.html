<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>НН Карта</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Golos+Text:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0e0f13;
      --panel: #16181f;
      --panel-border: #2a2d38;
      --accent: #c8f04a;
      --accent-dim: rgba(200, 240, 74, 0.12);
      --text: #e8eaf0;
      --text-muted: #6b7080;
      --danger: #ff5c5c;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Golos Text', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
      background: var(--panel);
      border-bottom: 1px solid var(--panel-border);
      z-index: 1000;
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Unbounded', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--accent);
    }

    header span {
      font-size: 13px;
      color: var(--text-muted);
    }

    .map-wrap {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Панель управления */
    .controls {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 260px;
    }

    .control-card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .control-card label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input[type="number"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Golos Text', sans-serif;
      font-size: 14px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      border-color: var(--accent);
    }

    input[type="number"]::placeholder {
      color: var(--text-muted);
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: 'Golos Text', sans-serif;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-accent {
      background: var(--accent);
      color: #0e0f13;
      flex: 1;
    }

    .btn-ghost {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(200,240,74,0.25);
    }

    .btn-danger-ghost {
      background: rgba(255,92,92,0.1);
      color: var(--danger);
      border: 1px solid rgba(255,92,92,0.2);
      width: 100%;
      margin-top: 6px;
    }

    /* Статус */
    .status {
      font-size: 12px;
      color: var(--text-muted);
      min-height: 16px;
      margin-top: 6px;
    }

    .status.ok { color: var(--accent); }
    .status.err { color: var(--danger); }

    /* Спиннер */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .loading .spinner { display: inline-block; }

    /* Leaflet тема */
    .leaflet-tile-pane { filter: brightness(0.85) saturate(0.7); }

    .leaflet-popup-content-wrapper {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .leaflet-popup-tip { background: var(--panel); }

    .leaflet-popup-content {
      margin: 12px 16px;
      font-family: 'Golos Text', sans-serif;
    }

    .popup-name {
      font-weight: 500;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .popup-cat {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .popup-route-btn {
      display: block;
      width: 100%;
      padding: 8px;
      background: var(--accent);
      color: #0e0f13;
      border: none;
      border-radius: 7px;
      font-family: 'Golos Text', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .popup-route-btn:hover { opacity: 0.85; }
    .popup-route-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Инфо-бейдж маршрута */
    .route-info {
      display: none;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      padding: 12px 16px;
    }

    .route-info.visible { display: block; }

    .route-info-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .route-info-text {
      font-size: 13px;
      color: var(--text);
    }
  </style>
</head>
<body>

<header>
  <h1>НН · Карта</h1>
  <span>Нижний Новгород</span>
</header>

<div class="map-wrap">
  <div id="map"></div>

  <div class="controls">

    <!-- Геолокация + поиск -->
    <div class="control-card">
      <label>Поиск объектов</label>
      <div class="row">
        <input type="number" id="radius" placeholder="Радиус, м" value="1000" min="100" max="10000" step="100" />
        <button class="btn btn-ghost" id="geoBtn" title="Определить моё местоположение">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
            <circle cx="12" cy="12" r="8" stroke-dasharray="2 2"/>
          </svg>
        </button>
        <button class="btn btn-accent" id="searchBtn">
          <span class="spinner"></span>
          <span class="btn-label">Найти</span>
        </button>
      </div>
      <div class="status" id="searchStatus"></div>
    </div>

    <!-- Инфо маршрута -->
    <div class="control-card route-info" id="routeInfo">
      <div class="route-info-title">Маршрут</div>
      <div class="route-info-text" id="routeInfoText">—</div>
      <button class="btn btn-danger-ghost" id="clearRouteBtn">Очистить маршрут</button>
    </div>

  </div>
</div>

<script>
  // ─── Карта ───────────────────────────────────────────────────
  const map = L.map('map', { zoomControl: false }).setView([56.3269, 44.0059], 13);

  L.control.zoom({ position: 'bottomright' }).addTo(map);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19,
  }).addTo(map);

  // ─── Состояние ───────────────────────────────────────────────
  let userLat = null;
  let userLon = null;
  let userMarker = null;
  let placeMarkers = L.layerGroup().addTo(map);
  let routeLayer = null;

  // ─── Иконки ──────────────────────────────────────────────────
  const userIcon = L.divIcon({
    className: '',
    html: `<div style="
      width:14px;height:14px;background:#c8f04a;border-radius:50%;
      border:2px solid #0e0f13;box-shadow:0 0 0 4px rgba(200,240,74,0.25)">
    </div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
  });

  const placeIcon = L.divIcon({
    className: '',
    html: `<div style="
      width:10px;height:10px;background:#c8f04a;border-radius:50%;
      border:2px solid #0e0f13;opacity:0.9">
    </div>`,
    iconSize: [10, 10],
    iconAnchor: [5, 5],
  });

  // ─── Геолокация ──────────────────────────────────────────────
  const geoBtn = document.getElementById('geoBtn');
  const searchStatus = document.getElementById('searchStatus');

  geoBtn.addEventListener('click', () => {
    if (!navigator.geolocation) {
      setStatus('Геолокация не поддерживается', 'err');
      return;
    }
    geoBtn.disabled = true;
    setStatus('Определяю местоположение…', '');
    navigator.geolocation.getCurrentPosition(
      pos => {
        userLat = pos.coords.latitude;
        userLon = pos.coords.longitude;
        map.setView([userLat, userLon], 15);
        if (userMarker) userMarker.remove();
        userMarker = L.marker([userLat, userLon], { icon: userIcon })
          .bindTooltip('Вы здесь', { permanent: false })
          .addTo(map);
        setStatus('Местоположение определено', 'ok');
        geoBtn.disabled = false;
      },
      err => {
        setStatus('Не удалось определить местоположение', 'err');
        geoBtn.disabled = false;
      }
    );
  });

  // ─── Поиск мест ──────────────────────────────────────────────
  const searchBtn = document.getElementById('searchBtn');
  const radiusInput = document.getElementById('radius');

  searchBtn.addEventListener('click', async () => {
    if (userLat === null) {
      setStatus('Сначала определите местоположение', 'err');
      return;
    }
    const radius = parseFloat(radiusInput.value) || 1000;
    setLoading(searchBtn, true);
    setStatus('Ищу объекты…', '');
    placeMarkers.clearLayers();

    try {
      const url = `/places/nearby?lat=${userLat}&lon=${userLon}&radius=${radius}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Ошибка сервера');
      const geojson = await res.json();

      const count = geojson.features?.length ?? 0;
      if (count === 0) {
        setStatus('Объектов не найдено', 'err');
      } else {
        setStatus(`Найдено: ${count} объектов`, 'ok');
        geojson.features.forEach(f => addPlaceMarker(f));
      }
    } catch (e) {
      setStatus('Ошибка запроса к серверу', 'err');
    } finally {
      setLoading(searchBtn, false);
    }
  });

  function addPlaceMarker(feature) {
    const [lon, lat] = feature.geometry.coordinates;
    const { name, category } = feature.properties;

    const marker = L.marker([lat, lon], { icon: placeIcon });

    const popupHtml = `
      <div class="popup-name">${name || 'Без названия'}</div>
      <div class="popup-cat">${category || '—'}</div>
      <button class="popup-route-btn" onclick="buildRoute(${lat}, ${lon}, '${(name||'Объект').replace(/'/g,"\\'")}', this)">
        Построить маршрут
      </button>
    `;

    marker.bindPopup(popupHtml, { maxWidth: 220 });
    placeMarkers.addLayer(marker);
  }

  // ─── Маршрут ─────────────────────────────────────────────────
  const routeInfo = document.getElementById('routeInfo');
  const routeInfoText = document.getElementById('routeInfoText');
  const clearRouteBtn = document.getElementById('clearRouteBtn');

  async function buildRoute(toLat, toLon, name, btn) {
    if (userLat === null) {
      alert('Сначала определите своё местоположение');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Строю маршрут…';

    if (routeLayer) { routeLayer.remove(); routeLayer = null; }

    try {
      const url = `/route?latFrom=${userLat}&lonFrom=${userLon}&latTo=${toLat}&lonTo=${toLon}`;
      const res = await fetch(url);
      if (res.status === 404) throw new Error('not_found');
      if (!res.ok) throw new Error('server');
      const data = await res.json();

      const coords = data.geometry.coordinates.map(([lon, lat]) => [lat, lon]);

      routeLayer = L.polyline(coords, {
        color: '#c8f04a',
        weight: 4,
        opacity: 0.9,
      }).addTo(map);

      map.fitBounds(routeLayer.getBounds(), { padding: [40, 40] });

      routeInfoText.textContent = `→ ${name}`;
      routeInfo.classList.add('visible');

    } catch (e) {
      if (e.message === 'not_found') {
        routeInfoText.textContent = 'Маршрут не найден';
      } else {
        routeInfoText.textContent = 'Ошибка при построении маршрута';
      }
      routeInfo.classList.add('visible');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Построить маршрут';
    }
  }

  clearRouteBtn.addEventListener('click', () => {
    if (routeLayer) { routeLayer.remove(); routeLayer = null; }
    routeInfo.classList.remove('visible');
  });

  // ─── Утилиты ─────────────────────────────────────────────────
  function setStatus(msg, type) {
    searchStatus.textContent = msg;
    searchStatus.className = 'status' + (type ? ' ' + type : '');
  }

  function setLoading(btn, on) {
    btn.classList.toggle('loading', on);
    btn.disabled = on;
    btn.querySelector('.btn-label').textContent = on ? 'Ищу…' : 'Найти';
  }
</script>
</body>
</html>
